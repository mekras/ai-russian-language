name: ai-russian-language
version: 1.2.3
description: "Коллекция переносимых навыков для русского языка в агентной разработке"
author: "mekras"
license: "MIT"
type: "skill"
includes: auto
dependencies:
  apm:
    - talkstream/ru-text#^1.8.0
  mcp: []
scripts:
  tests: "sh -c 'set -e; target=\"${APM_EVAL_PATH:-.apm/skills}\"; python3 tools/validate-trigger-evals.py \"$target\" --require-all; python3 tools/validate-skill-result-evals.py \"$target\"'"
  evals: "python3 tools/run_skill_evals.py \"${APM_EVAL_PATH:-.apm/skills}\""
